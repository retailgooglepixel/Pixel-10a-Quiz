<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Google Pixel 10a live session</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Google Sans', sans-serif;
      overscroll-behavior-y: none;
      background: #f1f3f4;
      color: #3c4043;
    }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      border-radius: 2rem;
    }

    .pulse-timer {
      animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(66, 133, 244, 0.5); }
      70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(66, 133, 244, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(66, 133, 244, 0); }
    }

    .animate-in {
      animation: slide-up 0.5s ease-out forwards;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .podium-1 { height: 180px; background: linear-gradient(135deg, #fbbc05, #f9ab00); border-radius: 1.5rem 1.5rem 0 0; }
    .podium-2 { height: 130px; background: linear-gradient(135deg, #bdc1c6, #9aa0a6); border-radius: 1.5rem 1.5rem 0 0; }
    .podium-3 { height: 90px; background: linear-gradient(135deg, #e37400, #b06000); border-radius: 1.5rem 1.5rem 0 0; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen flex flex-col">

  <div id="root" class="flex-1 flex flex-col"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, collection, serverTimestamp, query, getDocs } from 'firebase/firestore';
    import { Trophy, Smartphone, ArrowRight, Star, Clock, Play, Square, RefreshCcw, User, CheckCircle2, ChevronRight, Eye, Info, Users } from 'lucide-react';

    // Sichere Firebase Initialisierung (unterstützt lokale und externe Ausführung)
    let firebaseConfig;
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      firebaseConfig = {
        apiKey: "AIzaSyCNw2VGI326G6npQLr5inYwb9ZDVMgy6JA",
        authDomain: "bootcamp-4b851.firebaseapp.com",
        projectId: "bootcamp-4b851",
        storageBucket: "bootcamp-4b851.firebasestorage.app",
        messagingSenderId: "579476922275",
        appId: "1:579476922275:web:5476fad85409cc444a0416"
      };
    }
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'pixel-10a-live-training-sync-v1';

    // 15 Fragen aus den Trainingsunterlagen
    const QUESTIONS = [
      { q: "Welche Funktion würde einem Hobby-Fotografen helfen, um bessere Fotos zu machen?", options: ["Kamera-Coach", "Veo3", "Magisches Auge", "Pixel-Trainer"], correct: 0 },
      { q: "Wie hoch ist die CPU-Leistungssteigerung des neuen Google Tensor G5 Prozessors?", options: ["25%", "60%", "50%", "15%"], correct: 0 },
      { q: "Wie viel leistungsstärker ist die TPU des Tensor G5?", options: ["60%", "25%", "50%", "40%"], correct: 0 },
      { q: "Wie heißt die neue, auf Qi2 basierende Magnettechnologie für kabelloses Laden?", options: ["PixelDock", "MagCharge", "Pixelsnap", "TensorCharge"], correct: 1 },
      { q: "Wie lange wird das Pixel laut Google mit der Zeit immer besser (Updates)?", options: ["7 Jahre", "5 Jahre", "3 Jahre", "2 Jahre"], correct: 0 },
      { q: "Worüber kannst du mit Gemini Live auf Pixel sprechen?", options: ["Was du auf dem Bildschirm siehst", "Was mit deiner Kamera geteilt wird", "Beides", "Gar nichts von beidem"], correct: 2 },
      { q: "Was können deine KI-generierten Videos dank Gemini und Veo3 bieten?", options: ["Sound", "Sprache", "Menschen", "Alles davon"], correct: 3 },
      { q: "Welche Kamera-Ausstattung bietet das Pixel 10 Pro (XL)?", options: ["Nur Weitwinkel", "Dual-Kamera", "Profi-Dreifachkamerasystem mit 50/48/48 MP", "Dual-Kamera mit 100 MP"], correct: 2 },
      { q: "Wie viel RAM bietet das Pixel 10 Pro (XL) und das Pixel 10 Pro Fold?", options: ["8GB", "12GB", "16GB", "14GB"], correct: 2 },
      { q: "Welcher Sicherheitschip ist in der Pixel 10 Serie enthalten?", options: ["Titan M", "Nox Secure", "Titan M2", "Google Shield Protect"], correct: 2 },
      { q: "Wie lang können mit Veo3 erzeugte Videos maximal werden?", options: ["3 Sekunden", "5 Sekunden", "8 Sekunden", "10 Sekunden"], correct: 2 },
      { q: "Welches Displayglas kommt beim Pixel 10 zum Einsatz?", options: ["Aluminum Glass", "Saphierglas", "Corning® Gorilla® Glass Victus® 2", "Liquid OLED"], correct: 2 },
      { q: "Welche Speichergröße bietet das Pixel 10 Pro XL erstmals standardmäßig?", options: ["128GB", "512GB", "256GB", "64GB"], correct: 2 },
      { q: "Was macht das Aluminium in Raumfahrtqualität des Pixel 10 Pro nachhaltig?", options: ["Es ist zu 100 % recycelt.", "Es wird aus Raumschiffen gewonnen.", "Es wird aus Dosen hergestellt.", "Es ist biologisch abbaubar."], correct: 0 },
      { q: "Wie ruft man Gemini auf dem Pixel standardmäßig auf?", options: ["Power-Taste lang drücken", "Lauter-Taste", "Display antippen", "Schütteln"], correct: 0 }
    ];

    const TimerCircle = ({ seconds }) => (
      <div className="flex justify-center mb-6">
        <div className="w-24 h-24 md:w-32 md:h-32 rounded-full bg-white border-4 border-blue-500 flex flex-col items-center justify-center pulse-timer shadow-2xl relative z-10">
          <Clock size={16} className="text-blue-500 mb-1" />
          <span className="text-2xl md:text-3xl font-bold text-gray-800">
            {Math.floor(seconds / 60)}:{(seconds % 60).toString().padStart(2, '0')}
          </span>
        </div>
      </div>
    );

    const LoginScreen = ({ onJoin }) => {
      const [name, setName] = useState('');
      return (
        <div className="flex-1 flex items-center justify-center p-4 animate-in">
          <div className="glass-panel w-full max-w-md p-10 text-center shadow-2xl">
            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl text-white">
              <Smartphone size={40} />
            </div>
            <h1 className="text-3xl font-bold text-gray-900 mb-2">Google Pixel 10a</h1>
            <p className="text-blue-600 font-bold uppercase tracking-widest text-[10px] mb-10">Live Training Session</p>
            <form onSubmit={(e) => { e.preventDefault(); if(name.trim()) onJoin(name.trim()); }} className="space-y-4">
              <input 
                type="text" 
                value={name}
                onChange={(e) => setName(e.target.value)}
                className="w-full px-6 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 focus:outline-none bg-white text-lg transition-all"
                placeholder="Dein Vor- und Nachname"
                required
              />
              <button 
                type="submit"
                disabled={!name.trim()}
                className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all disabled:opacity-50"
              >
                Teilnehmen
              </button>
            </form>
          </div>
        </div>
      );
    };

    const QuizScreen = ({ question, index, onAnswer, timeLeft, showResults, userAnswer }) => {
      return (
        <div className="flex-1 flex flex-col max-w-2xl mx-auto w-full p-4 md:p-8 animate-in overflow-y-auto">
          <TimerCircle seconds={timeLeft} />
          <div className="mb-4 text-center">
            <span className="bg-blue-50 text-blue-700 px-5 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest border border-blue-100">
              Frage {index + 1} von 15
            </span>
          </div>
          <div className="glass-panel p-6 md:p-12 mb-8 border-l-8 border-l-blue-500">
            <h2 className="text-xl md:text-3xl font-bold text-gray-900 leading-tight">{question.q}</h2>
          </div>
          <div className="grid grid-cols-1 gap-4">
            {question.options.map((opt, i) => {
              const isCorrect = i === question.correct;
              const isSelected = userAnswer === i;
              
              let bgColor = "bg-white";
              let borderColor = "border-transparent";
              let textColor = "text-gray-700";

              if (showResults) {
                if (isCorrect) {
                  bgColor = "bg-green-100";
                  borderColor = "border-green-500";
                  textColor = "text-green-800";
                } else if (isSelected && !isCorrect) {
                  bgColor = "bg-red-100";
                  borderColor = "border-red-500";
                  textColor = "text-red-800";
                } else {
                  bgColor = "bg-gray-50 opacity-40";
                }
              } else if (isSelected) {
                bgColor = "bg-blue-50";
                borderColor = "border-blue-500";
              }

              return (
                <button
                  key={i}
                  disabled={showResults || userAnswer !== null}
                  onClick={() => onAnswer(i)}
                  className={`w-full p-5 md:p-6 text-left rounded-2xl shadow-sm border-2 transition-all font-medium flex justify-between items-center group ${bgColor} ${borderColor} ${textColor}`}
                >
                  <span className="text-lg">{opt}</span>
                  {showResults && isCorrect && <CheckCircle2 className="text-green-600" size={24} />}
                  {!showResults && isSelected && <div className="w-4 h-4 rounded-full bg-blue-500"></div>}
                </button>
              );
            })}
          </div>
          {userAnswer !== null && !showResults && (
            <div className="mt-8 p-6 bg-blue-50 rounded-2xl border border-blue-100 flex items-center gap-4 animate-pulse">
              <span className="text-blue-600"><Info size={24} /></span>
              <p className="text-blue-800 font-bold">Antwort eingeloggt. Warte auf die Auflösung durch den Trainer...</p>
            </div>
          )}
        </div>
      );
    };

    const FeedbackScreen = ({ onFinish }) => {
      const [r1, setR1] = useState(0);
      const [r2, setR2] = useState(0);
      return (
        <div className="flex-1 flex items-center justify-center p-4 animate-in">
          <div className="glass-panel w-full max-w-md p-10 text-center shadow-2xl">
            <h2 className="text-3xl font-bold text-gray-900 mb-8">Dein Feedback</h2>
            <div className="mb-8">
              <p className="text-gray-500 mb-4 font-bold uppercase text-[10px] tracking-widest">Wie bewertest du das Training?</p>
              <div className="flex justify-center gap-4">
                {[1,2,3,4,5].map(s => (
                  <button key={s} onClick={() => setR1(s)} className="transform transition-transform hover:scale-120">
                    <Star size={36} fill={r1 >= s ? "#fbbc05" : "none"} color={r1 >= s ? "#fbbc05" : "#dadce0"} />
                  </button>
                ))}
              </div>
            </div>
            <div className="mb-12">
              <p className="text-gray-500 mb-6 font-bold uppercase text-[10px] tracking-widest">Empfehlung an Kunden?</p>
              <div className="flex justify-center gap-3">
                {[1,2,3,4,5].map(v => (
                  <button 
                    key={v} 
                    onClick={() => setR2(v)} 
                    className={`w-12 h-12 rounded-2xl font-bold transition-all ${r2 === v ? 'bg-blue-600 text-white shadow-xl' : 'bg-gray-100 text-gray-400'}`}
                  >
                    {v}
                  </button>
                ))}
              </div>
            </div>
            <button 
              onClick={() => onFinish(r1, r2)} 
              disabled={!r1 || !r2} 
              className="w-full py-5 bg-green-500 text-white rounded-2xl font-bold text-lg shadow-xl shadow-green-100 disabled:opacity-50"
            >
              Absenden & Zum Podium
            </button>
          </div>
        </div>
      );
    };

    const PodiumScreen = ({ leaderboard, score, name }) => {
      const top3 = [...leaderboard].sort((a,b) => b.score - a.score).slice(0, 3);
      return (
        <div className="flex-1 flex flex-col items-center justify-center p-4 animate-in w-full max-w-xl mx-auto">
          <h1 className="text-3xl md:text-5xl font-bold text-gray-900 mb-12 text-center">Top Ergebnisse</h1>
          <div className="flex items-end justify-center gap-2 md:gap-4 mb-12 w-full px-4 h-64">
            <div className="flex flex-col items-center flex-1">
              <p className="text-[10px] font-bold text-gray-400 truncate w-full text-center mb-1">{top3[1]?.name || '-'}</p>
              <div className="podium-2 w-full flex items-center justify-center shadow-lg"><span className="text-3xl font-bold text-white">2</span></div>
            </div>
            <div className="flex flex-col items-center flex-1">
              <span className="text-yellow-500 mb-3 animate-bounce"><Trophy size={48} /></span>
              <p className="text-xs font-bold text-gray-800 truncate w-full text-center mb-1">{top3[0]?.name || '-'}</p>
              <div className="podium-1 w-full flex items-center justify-center shadow-2xl"><span className="text-5xl font-bold text-white">1</span></div>
            </div>
            <div className="flex flex-col items-center flex-1">
              <p className="text-[10px] font-bold text-gray-400 truncate w-full text-center mb-1">{top3[2]?.name || '-'}</p>
              <div className="podium-3 w-full flex items-center justify-center shadow-lg"><span className="text-2xl font-bold text-white">3</span></div>
            </div>
          </div>
          <div className="glass-panel w-full p-8 text-center shadow-xl">
            <p className="text-gray-400 font-bold uppercase text-[10px] mb-2 tracking-widest">Deine Leistung</p>
            <p className="text-5xl font-bold text-blue-600 mb-2">{score} <span className="text-sm text-gray-300">Pkt</span></p>
            <p className="text-gray-600 mt-4 italic">{name}, danke für deine Teilnahme!</p>
          </div>
        </div>
      );
    };

    const AdminDashboard = ({ gameState, users, onNextQuestion, onReveal, onStart, onReset }) => {
      const currentQ = QUESTIONS[gameState.currentQuestionIndex || 0];
      const sortedUsers = [...users].sort((a,b) => b.score - a.score);
      const answersCount = users.filter(u => u.lastAnswerIndex !== undefined && u.lastAnswerIndex !== null).length;

      return (
        <div className="flex-1 p-4 md:p-12 max-w-6xl mx-auto w-full overflow-y-auto bg-gray-50/50">
          <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div>
              <h1 className="text-4xl font-bold text-gray-900">Live Session Control</h1>
              <p className="text-gray-500">Google Pixel 10a Live Session</p>
            </div>
            <div className="flex gap-4">
              {gameState.status === 'waiting' ? (
                <button onClick={onStart} className="px-10 py-4 bg-green-500 text-white rounded-2xl font-bold flex items-center gap-3 shadow-xl shadow-green-100 hover:bg-green-600 active:scale-95 transition-all"><Play size={20}/> Quiz starten</button>
              ) : (
                <button onClick={onReset} className="p-4 bg-white border border-gray-200 rounded-2xl text-gray-500 hover:bg-gray-100 transition-all"><RefreshCcw size={20}/></button>
              )}
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-8 mb-10">
            <div className="xl:col-span-2">
              {gameState.status === 'running' ? (
                <div className="glass-panel p-8 md:p-12 border-l-[12px] border-l-blue-500 animate-in">
                  <div className="flex justify-between items-center mb-8">
                    <span className="bg-blue-100 text-blue-700 px-5 py-2 rounded-full text-xs font-bold uppercase tracking-wider">Frage {gameState.currentQuestionIndex + 1} / 15</span>
                    <div className="flex items-center gap-2 text-gray-500 font-bold">
                      <User size={18} /> 
                      <span>{answersCount} von {users.length} Teilnehmern</span>
                    </div>
                  </div>
                  
                  <h2 className="text-2xl md:text-4xl font-bold mb-10 text-gray-900 leading-tight">{currentQ.q}</h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
                    {currentQ.options.map((opt, i) => (
                      <div key={i} className={`p-6 rounded-2xl border-2 flex justify-between items-center text-lg ${i === currentQ.correct ? 'bg-green-50 border-green-500 text-green-700 font-bold' : 'bg-white border-gray-100 text-gray-600'}`}>
                        <span>{opt}</span>
                        {i === currentQ.correct && <CheckCircle2 size={24} />}
                      </div>
                    ))}
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4">
                    {!gameState.showResults ? (
                      <button onClick={onReveal} className="flex-1 py-5 bg-blue-600 text-white rounded-2xl font-bold text-xl flex items-center justify-center gap-3 shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all"><Eye size={24}/> Antwort auflösen</button>
                    ) : (
                      <button onClick={onNextQuestion} className="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-bold text-xl flex items-center justify-center gap-3 shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">
                        {gameState.currentQuestionIndex < 14 ? 'Nächste Frage' : 'Feedback einholen'} <ChevronRight size={24}/>
                      </button>
                    )}
                  </div>
                </div>
              ) : (
                <div className="glass-panel p-12 text-center animate-in">
                   <div className="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
                      <Users size={40} />
                   </div>
                   <h2 className="text-2xl font-bold text-gray-900 mb-2">Bereit für den Start?</h2>
                   <p className="text-gray-500">Sobald alle Teilnehmer beigetreten sind, kannst du das Quiz oben rechts starten.</p>
                </div>
              )}
            </div>

            <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border border-gray-100 h-fit">
              <h3 className="font-bold text-gray-400 uppercase text-xs mb-6 tracking-widest border-b pb-4">
                {gameState.status === 'running' ? 'Live Rangliste' : 'Lobby - Teilnehmer'}
              </h3>
              <div className="space-y-4">
                {sortedUsers.map((u, i) => (
                  <div key={u.id} className="flex justify-between items-center p-4 hover:bg-gray-50 rounded-2xl transition-all border border-transparent hover:border-gray-100">
                    <div className="flex items-center gap-4">
                      <span className={`font-bold w-6 h-6 flex items-center justify-center rounded-full text-xs ${i === 0 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-400'}`}>
                        {i+1}
                      </span>
                      <span className="font-bold text-gray-800">{u.name}</span>
                    </div>
                    <span className="font-bold text-blue-600">{u.score} <span className="text-[10px] text-gray-300">Pkt</span></span>
                  </div>
                ))}
                {sortedUsers.length === 0 && (
                  <div className="text-center py-8">
                     <p className="text-gray-400 text-sm">Warte auf Teilnehmer...</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [userId, setUserId] = useState(null);
      const [gameState, setGameState] = useState({ status: 'loading' });
      const [allUsers, setAllUsers] = useState([]);
      const [userAnswer, setUserAnswer] = useState(null);
      const [timeLeft, setTimeLeft] = useState(0);
      const [step, setStep] = useState('login'); 

      // 1. Initialisierung und Authentifizierung
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth Error", e);
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, u => { 
          if(u) setUserId(u.uid); 
        });
        return () => unsubscribe();
      }, []);

      // 2. Echtzeit GameState auslesen (aber den Step nur ändern, wenn ein User eingeloggt ist)
      useEffect(() => {
        if (!userId) return;
        const gameRef = doc(db, 'artifacts', appId, 'public', 'gameState');
        
        const unsub = onSnapshot(gameRef, snap => {
          if (snap.exists()) {
            const data = snap.data();
            setGameState(data);
            
            // GATEKEEPER-LOGIK: Das System ändert den Screen (Step) NUR, wenn ein Nutzer bereits existiert (angemeldet ist)
            if (user) {
              if (data.status === 'running') {
                setStep('quiz');
                if (data.endTime) {
                  const interval = setInterval(() => {
                    const diff = Math.max(0, Math.ceil((data.endTime.toMillis() - Date.now()) / 1000));
                    setTimeLeft(diff);
                  }, 1000);
                  return () => clearInterval(interval);
                }
              } else if (data.status === 'waiting') {
                setStep(user.isAdmin ? 'admin' : 'waiting');
              } else if (data.status === 'feedback') {
                setStep('feedback');
              } else if (data.status === 'podium') {
                setStep('podium');
              }
            }
          }
        }, (error) => console.error("Snapshot error", error));
        
        return () => unsub();
      }, [userId, user]); // Die Abhängigkeit "user" stellt sicher, dass dies nach dem Login triggert

      // 3. Wenn die Frage wechselt, die lokale Auswahl zurücksetzen
      useEffect(() => {
        setUserAnswer(null);
      }, [gameState.currentQuestionIndex]);

      // 4. Echtzeit User-Liste auslesen
      useEffect(() => {
        if (!userId) return;
        if (user?.isAdmin || step === 'podium' || step === 'admin') {
          const q = query(collection(db, 'artifacts', appId, 'users'));
          const unsub = onSnapshot(q, snap => {
            const list = [];
            snap.forEach(d => list.push({ id: d.id, ...d.data() }));
            setAllUsers(list);
          }, (error) => console.error(error));
          return () => unsub();
        }
      }, [userId, user?.isAdmin, step]);

      // --- LOGIK FUNKTIONEN ---

      const handleJoin = async (name) => {
        if (!userId) return;
        const isAdmin = name.toLowerCase() === 'admin';
        const uData = { name, isAdmin, score: 0, finished: false };
        
        // Zuerst den lokalen Status aktualisieren (damit der Gatekeeper öffnet)
        setUser(uData);
        
        if (!isAdmin) {
          await setDoc(doc(db, 'artifacts', appId, 'users', userId), uData);
          
          // Nach dem Klick prüfen, ob die Session zufällig schon läuft
          if (gameState.status === 'running') setStep('quiz');
          else if (gameState.status === 'feedback') setStep('feedback');
          else if (gameState.status === 'podium') setStep('podium');
          else setStep('waiting');
        } else {
          setStep('admin');
        }
      };

      const handleAnswer = async (idx) => {
        if (userAnswer !== null || !userId) return;
        setUserAnswer(idx);
        
        const isCorrect = QUESTIONS[gameState.currentQuestionIndex].correct === idx;
        const currentScore = allUsers.find(u => u.id === userId)?.score || 0;
        
        await updateDoc(doc(db, 'artifacts', appId, 'users', userId), { 
          lastAnswerIndex: idx,
          score: currentScore + (isCorrect ? 10 : 0)
        });
      };

      const handleFinishFeedback = async (f1, f2) => {
        if(!userId) return;
        await updateDoc(doc(db, 'artifacts', appId, 'users', userId), { 
          finished: true, 
          feedback: { r1: f1, r2: f2 } 
        });
        setStep('waiting'); 
      };

      // --- ADMIN FUNKTIONEN ---

      const adminStart = async () => {
        const endTime = new Date();
        endTime.setMinutes(endTime.getMinutes() + 20); // 20 Minuten Gesamt-Timer
        await setDoc(doc(db, 'artifacts', appId, 'public', 'gameState'), { 
          status: 'running', 
          currentQuestionIndex: 0, 
          showResults: false, 
          endTime 
        });
      };

      const adminReveal = async () => {
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'gameState'), { showResults: true });
      };

      const adminNext = async () => {
        const nextIndex = (gameState.currentQuestionIndex || 0) + 1;
        if (nextIndex < 15) {
          // Alle Live-Antworten in der Datenbank bereinigen für die nächste Runde
          const usersSnap = await getDocs(collection(db, 'artifacts', appId, 'users'));
          const updatePromises = usersSnap.docs.map(uDoc => updateDoc(uDoc.ref, { lastAnswerIndex: null }));
          await Promise.all(updatePromises);
          
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'gameState'), { currentQuestionIndex: nextIndex, showResults: false });
        } else {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'gameState'), { status: 'feedback' });
        }
      };

      const adminReset = async () => {
        await setDoc(doc(db, 'artifacts', appId, 'public', 'gameState'), { status: 'waiting', currentQuestionIndex: 0 });
        const usersSnap = await getDocs(collection(db, 'artifacts', appId, 'users'));
        const updatePromises = usersSnap.docs.map(uDoc => updateDoc(uDoc.ref, { score: 0, lastAnswerIndex: null, finished: false }));
        await Promise.all(updatePromises);
      };

      const adminToPodium = async () => {
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'gameState'), { status: 'podium' });
      };

      // --- RENDERING GATEKEEPER ---
      
      // Regel 1: Ohne "user"-Objekt kommst du an dieser Maske niemals vorbei.
      if (!user) return <LoginScreen onJoin={handleJoin} />;

      // Regel 2: Wenn du der Admin bist, erhältst du das Dashboard.
      if (user.isAdmin) return (
        <div className="flex-1 flex flex-col">
          <AdminDashboard gameState={gameState} users={allUsers} onStart={adminStart} onReveal={adminReveal} onNextQuestion={adminNext} onReset={adminReset} />
          {gameState.status === 'feedback' && (
             <div className="fixed bottom-8 left-1/2 -translate-x-1/2">
                <button onClick={adminToPodium} className="px-12 py-5 bg-yellow-500 text-white rounded-2xl font-bold shadow-2xl hover:bg-yellow-600 active:scale-95 transition-all text-xl">Podium anzeigen</button>
             </div>
          )}
        </div>
      );

      // Regel 3: Für normale Teilnehmer werden die Status-Masken gerendert.
      if (step === 'waiting') return (
        <div className="flex-1 flex flex-col items-center justify-center p-6 text-center animate-in">
          <div className="glass-panel p-12 max-w-sm w-full shadow-2xl">
            <div className="w-24 h-24 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
              <User size={48} />
            </div>
            <h2 className="text-3xl font-bold mb-3 text-gray-900">Moin {user.name.split(' ')[0]}!</h2>
            <p className="text-gray-500 leading-relaxed">Bitte hab einen Moment Geduld. Der Trainer startet die Session gleich.</p>
          </div>
        </div>
      );
      
      if (step === 'quiz') return <QuizScreen question={QUESTIONS[gameState.currentQuestionIndex]} index={gameState.currentQuestionIndex} onAnswer={handleAnswer} timeLeft={timeLeft} showResults={gameState.showResults} userAnswer={userAnswer} />;
      if (step === 'feedback') return <FeedbackScreen onFinish={handleFinishFeedback} />;
      if (step === 'podium') return <PodiumScreen leaderboard={allUsers} score={allUsers.find(u => u.id === userId)?.score || 0} name={user.name} />;

      // Fallback Ladebildschirm
      return <div className="flex-1 flex items-center justify-center"><div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
