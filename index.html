<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Google Pixel 10a live session</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Google Sans', sans-serif;
      overscroll-behavior-y: none;
      color: #202124;
    }
    
    /* Fixed Background Layers for transparent image effect */
    .bg-base {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #f8f9fa;
      z-index: -2;
    }
    
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://i.postimg.cc/mgbBY4JZ/Bildschirmfoto_2026_02_16_um_15_31_19.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.35; /* Transparenz des Bildes */
      z-index: -1;
    }
    
    /* Enhanced Glass Panel */
    .glass-panel {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
      border-radius: 2rem;
    }

    .pulse-timer {
      animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(66, 133, 244, 0.5); }
      70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(66, 133, 244, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(66, 133, 244, 0); }
    }

    .animate-in {
      animation: slide-up 0.5s ease-out forwards;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .podium-1 { height: 180px; background: linear-gradient(135deg, #fbbc05, #f9ab00); border-radius: 1.5rem 1.5rem 0 0; }
    .podium-2 { height: 130px; background: linear-gradient(135deg, #bdc1c6, #9aa0a6); border-radius: 1.5rem 1.5rem 0 0; }
    .podium-3 { height: 90px; background: linear-gradient(135deg, #e37400, #b06000); border-radius: 1.5rem 1.5rem 0 0; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.378.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen flex flex-col relative">
  <!-- Background Layers -->
  <div class="bg-base"></div>
  <div class="bg-overlay"></div>

  <div id="root" class="flex-1 flex flex-col relative z-10"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, collection, query, getDocs, getDoc, increment } from 'firebase/firestore';
    import { Trophy, Smartphone, ArrowRight, Star, Clock, Play, Square, RefreshCcw, User, CheckCircle2, ChevronRight, Eye, Info, Users, Timer, KeyRound, Shuffle } from 'lucide-react';

    let firebaseConfig;
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      firebaseConfig = {
        apiKey: "AIzaSyBrEdY01zkWxJTZNNEPxXUvCzqYm4bLmGw",
        authDomain: "quiz10a.firebaseapp.com",
        projectId: "quiz10a",
        storageBucket: "quiz10a.firebasestorage.app",
        messagingSenderId: "424627291161",
        appId: "1:424627291161:web:d9d1a6410125e4d808d688",
        measurementId: "G-9T5F64DRCJ"
      };
    }
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const BASE_APP_ID = 'pixel-10a-live-training';

    // Die Google Farben (Blau, Rot, Gelb, Grün)
    const GOOGLE_COLORS = [
      { bg: 'bg-[#4285F4]', text: 'text-white', border: 'border-[#4285F4]' },
      { bg: 'bg-[#EA4335]', text: 'text-white', border: 'border-[#EA4335]' },
      { bg: 'bg-[#FBBC05]', text: 'text-gray-900', border: 'border-[#FBBC05]' },
      { bg: 'bg-[#34A853]', text: 'text-white', border: 'border-[#34A853]' }
    ];

    // GESAMTER FRAGENKATALOG (Wird vom Admin dynamisch gemischt)
    const ALL_QUESTIONS = [
      { q: "Eine Kundin möchte wissen, wie das Pixel 10a sie beim Multitasking unterstützen und schneller Antworten finden kann. Was ist das wichtigste Tool?", options: ["Google Assistant", "Gemini", "Pixel Screenshots", "Gemini Nano"], correct: 1 },
      { q: "Welche Softwarezusage gibt Google für das Pixel 10a für mehr Langlebigkeit?", options: ["3 Jahre OS- & 5 Jahre Sicherheitsupdates", "5 Jahre OS-Updates per Pixel Drop", "7 Jahre Betriebssystem- und Sicherheitsupdates", "4 Jahre Support durch Titan M2"], correct: 2 },
      { q: "Wie hilft 'Circle to Search' den Nutzern des Pixel 10a im Alltag?", options: ["Man kreist das Smartphone in der Luft", "Man kann Bilder/Texte einkreisen, um direkt danach zu suchen", "Es sucht automatisch nach WLAN", "Es organisiert Kontakte in Kreisen"], correct: 1 },
      { q: "Welches Kamera-Feature sorgt dafür, dass auf Gruppenfotos jeder gut aussieht, indem ähnliche Fotos kombiniert werden?", options: ["Magischer Editor", "Scharfzeichnen", "Beste Aufnahme (Auto Best Take)", "Nachtsicht"], correct: 2 },
      { q: "Wie unterstützt der 'Magische Audio-Radierer' beim Pixel 10a?", options: ["Er reduziert störende Hintergrundgeräusche in Videos", "Er fügt automatisch Musik zu Fotos hinzu", "Er löscht Sprachnachrichten", "Er verbessert die Lautsprecher-Qualität"], correct: 0 },
      { q: "Was zeichnet das Actua-Display des Pixel 10a aus?", options: ["Es ist ein E-Ink-Display zum Lesen", "Es ist besonders hell und flüssig, dank bis zu 120 Hz Bildwiederholungsrate, ideal für draußen", "Es hat eine Auflösung von 8K", "Es lässt sich in der Mitte falten"], correct: 1 },
      { q: "Welche Funktion hilft dabei, verschwommene oder alte, unscharfe Fotos im Nachhinein zu retten?", options: ["Scharfzeichnen (Photo Unblur)", "Magischer Editor", "Super-Resolution-Zoom", "Astromodus"], correct: 0 },
      { q: "Welcher Prozessor treibt das Google Pixel 10a an und ermöglicht die schnellen KI-Funktionen?", options: ["Snapdragon 8 Gen 3", "Google Tensor G4", "Exynos 2400", "A16 Bionic"], correct: 1 },
      { q: "Wie schützt das Pixel 10a die Daten der Nutzer auf Hardware-Ebene?", options: ["Google Shield Protect", "Titan M2-Sicherheitschip", "Externe verschlüsselte SD-Karte", "Nox Secure"], correct: 1 },
      { q: "Welche KI-Funktion hilft am besten im Ausland, um ein Straßenschild oder eine Speisekarte zu verstehen?", options: ["Google Maps", "Live-Übersetzung", "Circle to Search", "Pixel Screenshots"], correct: 1 },
      { q: "Was macht die 'Pixel Screenshots'-App auf dem Pixel 10a so besonders?", options: ["Sie speichert Screenshots in der Cloud", "Sie macht alle 10 Minuten einen Screenshot", "Sie nutzt KI, um Inhalte von Screenshots durchsuchbar zu machen", "Sie teilt Screenshots sofort auf Social Media"], correct: 2 },
      { q: "Wie hilft das Pixel 10a Nutzern, die nachts oder bei schlechtem Licht fotografieren möchten?", options: ["Mit dem integrierten LED-Ringblitz", "Mit der Funktion 'Nachtsicht' (Night Sight)", "Durch automatische Aufhellung", "Mit dem Makrofokus"], correct: 1 },
      { q: "Was passiert, wenn ein Nutzer auf dem Pixel 10a einen unerwünschten Spam-Anruf erhält?", options: ["Der Anruf-Filter kann Spam prüfen und blockieren", "Das Smartphone schaltet sich stumm", "Der Anrufer wird blockiert, aber die Mailbox wird voll", "Man benötigt eine Drittanbieter-App"], correct: 0 },
      { q: "Ein Kunde möchte störende Personen aus dem Hintergrund eines Urlaubsfotos entfernen. Welches Tool nutzt er?", options: ["Scharfzeichnen", "Beste Aufnahme", "Magischer Editor", "Action-Pan"], correct: 2 },
      { q: "Wie optimiert das Pixel 10a seine Akkulaufzeit im Alltag?", options: ["Es schaltet das Display sofort ab", "Es beendet alle Hintergrund-Apps", "Mit dem 'Intelligenten Akku', der die App-Nutzung lernt", "Es drosselt dauerhaft die Leistung"], correct: 2 },
      { q: "Ein Kunde möchte aus einer einfachen Kritzelei eine originelle Einladung erstellen. Welche Funktion nutzt er?", options: ["Nano Banana (Bilder erstellen)", "Magischer Editor", "Scharfzeichnen", "Circle to Search"], correct: 0 },
      { q: "Welches Angebot erhalten Käufer eines neuen Google Pixel 10a in der Regel NICHT kostenlos zum Testen?", options: ["YouTube Premium", "Fitbit Premium", "Google One AI Premium", "Google Play Pass"], correct: 2 },
      { q: "Worüber kannst du mit Gemini Live auf dem Pixel 10a ganz natürlich sprechen?", options: ["Nur über Textnachrichten", "Über Dinge, die du auf dem Bildschirm siehst oder in der Kamera teilst", "Nur über das Wetter", "Gar nichts von beidem"], correct: 1 },
      { q: "Welche Kamera-Ausstattung bietet das Pixel 10a auf der Rückseite?", options: ["Nur Weitwinkel", "Dual-Kamera", "Dreifachkamerasystem", "Vierfachkamerasystem"], correct: 1 },
      { q: "Was macht das Aluminium-Gehäuse des Pixel 10a besonders nachhaltig?", options: ["Es ist zu 100 % recycelt", "Es wird aus Raumschiffen gewonnen", "Es ist biologisch abbaubar", "Es besteht aus Plastik"], correct: 0 }
    ];

    const TimerCircle = ({ seconds }) => (
      <div className="flex justify-center mb-6">
        <div className={`w-24 h-24 md:w-32 md:h-32 rounded-full bg-white/80 backdrop-blur-md border-4 flex flex-col items-center justify-center shadow-2xl relative z-10 transition-colors ${seconds === 0 ? 'border-red-500 text-red-500' : 'border-blue-500 text-blue-500 pulse-timer'}`}>
          <Timer size={20} className="mb-1" />
          <span className={`text-3xl md:text-4xl font-bold ${seconds === 0 ? 'text-red-600' : 'text-gray-800'}`}>
            {seconds}
          </span>
        </div>
      </div>
    );

    const LoginScreen = ({ onJoin }) => {
      const [name, setName] = useState('');
      const [room, setRoom] = useState('');
      return (
        <div className="flex-1 flex items-center justify-center p-4 animate-in">
          <div className="glass-panel w-full max-w-md p-10 text-center shadow-2xl">
            <div className="w-20 h-20 bg-blue-600/90 backdrop-blur-sm rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl text-white">
              <Smartphone size={40} />
            </div>
            <h1 className="text-3xl font-bold text-gray-900 mb-2">Google Pixel 10a</h1>
            <p className="text-blue-600 font-bold uppercase tracking-widest text-[10px] mb-10">Live Training Session</p>
            <form onSubmit={(e) => { e.preventDefault(); if(name.trim() && room.trim()) onJoin(name.trim(), room.trim()); }} className="space-y-4">
              <input 
                type="text" 
                value={room}
                onChange={(e) => setRoom(e.target.value.toUpperCase())}
                className="w-full px-6 py-4 rounded-2xl border border-white/60 focus:border-blue-500 focus:outline-none bg-white/70 backdrop-blur-md text-lg transition-all text-center uppercase tracking-widest font-bold text-blue-800 placeholder:text-gray-500 placeholder:font-normal shadow-inner"
                placeholder="Raum-Code (z.B. HAMBURG)"
                required
              />
              <input 
                type="text" 
                value={name}
                onChange={(e) => setName(e.target.value)}
                className="w-full px-6 py-4 rounded-2xl border border-white/60 focus:border-blue-500 focus:outline-none bg-white/70 backdrop-blur-md text-lg transition-all text-center shadow-inner"
                placeholder="Dein Vor- und Nachname"
                required
              />
              <button 
                type="submit"
                disabled={!name.trim() || !room.trim()}
                className="w-full py-5 bg-blue-600/90 backdrop-blur-sm text-white rounded-2xl font-bold text-lg shadow-xl hover:bg-blue-700 active:scale-95 transition-all disabled:opacity-50 mt-4"
              >
                Teilnehmen
              </button>
            </form>
          </div>
        </div>
      );
    };

    const QuizScreen = ({ question, index, totalQuestions, onAnswer, timeLeft, showResults, userAnswer, isDoublePoints, myRank, myScore, lastPointsEarned }) => {
      return (
        <div className="flex-1 flex flex-col max-w-2xl mx-auto w-full p-4 md:p-8 animate-in overflow-y-auto">
          
          <div className="flex justify-between items-center w-full mb-6 relative z-20">
             <div className="glass-panel px-4 py-2 flex items-center gap-2 font-bold text-gray-800 shadow-sm border border-white/60">
                <Trophy size={18} className="text-yellow-500" />
                Platz {myRank}
             </div>
             <div className="glass-panel px-4 py-2 flex items-center gap-2 font-bold text-blue-700 shadow-sm border border-white/60">
                {myScore} Pkt
                <Star size={18} className="text-blue-500" />
             </div>
          </div>

          <TimerCircle seconds={timeLeft} />
          
          <div className="mb-4 flex justify-center">
            <span className="glass-panel px-5 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest text-blue-800">
              Frage {index + 1} von {totalQuestions}
            </span>
          </div>
          
          <div className={`glass-panel p-6 md:p-12 mb-8 border-l-8 ${isDoublePoints ? 'border-l-yellow-400' : 'border-l-blue-500'} relative`}>
            {isDoublePoints && (
              <div className="absolute -top-4 -right-4 bg-yellow-400 text-yellow-900 text-xs font-bold px-3 py-1 rounded-full shadow-md flex items-center gap-1 animate-bounce">
                <Star size={12} fill="currentColor" />
                2x PUNKTE
              </div>
            )}
            <h2 className="text-xl md:text-3xl font-bold text-gray-900 leading-tight drop-shadow-sm">{question.q}</h2>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {question.options.map((opt, i) => {
              const isCorrect = i === question.correct;
              const isSelected = userAnswer === i;
              const colors = GOOGLE_COLORS[i % 4];
              
              let styleClass = `${colors.bg} ${colors.text} border-transparent`;

              if (showResults) {
                if (isCorrect) {
                  styleClass += " scale-105 shadow-2xl ring-4 ring-offset-2 ring-green-400";
                } else {
                  styleClass += " opacity-40 grayscale";
                }
              } else if (userAnswer !== null) {
                if (isSelected) {
                  styleClass += " ring-4 ring-offset-2 ring-white/60 scale-105 shadow-xl";
                } else {
                  styleClass += " opacity-60 backdrop-blur-md";
                }
              } else {
                 styleClass += " hover:brightness-110 hover:-translate-y-1 shadow-lg";
              }

              return (
                <button
                  key={i}
                  disabled={showResults || userAnswer !== null}
                  onClick={() => onAnswer(i)}
                  className={`w-full p-5 md:p-6 text-left rounded-2xl shadow-md border-2 transition-all duration-300 font-bold flex justify-between items-center group ${styleClass}`}
                >
                  <span className="text-lg drop-shadow-sm">{opt}</span>
                  {showResults && isCorrect && <CheckCircle2 className={colors.text} size={28} />}
                </button>
              );
            })}
          </div>
          
          {userAnswer !== null && !showResults && (
            <div className={`mt-8 p-6 rounded-2xl border backdrop-blur-md flex items-center justify-center gap-4 ${userAnswer === -1 ? 'bg-red-50/80 border-red-200' : 'bg-blue-50/80 border-blue-200 animate-pulse shadow-sm'}`}>
              <span className={userAnswer === -1 ? "text-red-500" : "text-blue-600"}><Info size={24} /></span>
              <p className={userAnswer === -1 ? "text-red-700 font-bold text-center" : "text-blue-800 font-bold text-center"}>
                {userAnswer === -1 ? "Zeit abgelaufen! Keine Antwort gewertet." : "Antwort eingeloggt. Warte auf die Auflösung durch den Trainer..."}
              </p>
            </div>
          )}

          {showResults && (
            <div className={`mt-8 p-6 rounded-2xl border backdrop-blur-md flex items-center justify-center gap-4 animate-in shadow-md ${userAnswer === question.correct ? 'bg-green-100/90 border-green-300 text-green-800' : 'bg-red-50/90 border-red-200 text-red-800'}`}>
              <h3 className="font-bold text-xl text-center">
                {userAnswer === question.correct 
                  ? (isDoublePoints ? `🎉 Richtig! Schnelligkeits-Bonus: +${lastPointsEarned} Punkte!` : `🎉 Richtig! Schnelligkeits-Bonus: +${lastPointsEarned} Punkte!`) 
                  : (userAnswer === -1 ? "⏱️ Zeit abgelaufen (0 Punkte)" : "❌ Leider falsch (0 Punkte)")}
              </h3>
            </div>
          )}
        </div>
      );
    };

    const FeedbackScreen = ({ onFinish }) => {
      const [r1, setR1] = useState(0);
      const [r2, setR2] = useState(0);
      return (
        <div className="flex-1 flex items-center justify-center p-4 animate-in">
          <div className="glass-panel w-full max-w-md p-10 text-center shadow-2xl">
            <h2 className="text-3xl font-bold text-gray-900 mb-8">Dein Feedback</h2>
            <div className="mb-8">
              <p className="text-gray-600 mb-4 font-bold uppercase text-[10px] tracking-widest">Wie bewertest du das Training?</p>
              <div className="flex justify-center gap-4">
                {[1,2,3,4,5].map(s => (
                  <button key={s} onClick={() => setR1(s)} className="transform transition-transform hover:scale-120">
                    <Star size={36} fill={r1 >= s ? "#fbbc05" : "none"} color={r1 >= s ? "#fbbc05" : "#a1a1aa"} />
                  </button>
                ))}
              </div>
            </div>
            <div className="mb-12">
              <p className="text-gray-600 mb-6 font-bold uppercase text-[10px] tracking-widest">Empfehlung an Kunden?</p>
              <div className="flex justify-center gap-3">
                {[1,2,3,4,5].map(v => (
                  <button 
                    key={v} 
                    onClick={() => setR2(v)} 
                    className={`w-12 h-12 rounded-2xl font-bold transition-all shadow-sm ${r2 === v ? 'bg-blue-600/90 backdrop-blur-md text-white scale-110' : 'bg-white/60 text-gray-500 hover:bg-white/80'}`}
                  >
                    {v}
                  </button>
                ))}
              </div>
            </div>
            <button 
              onClick={() => onFinish(r1, r2)} 
              disabled={!r1 || !r2} 
              className="w-full py-5 bg-green-500/90 backdrop-blur-md text-white rounded-2xl font-bold text-lg shadow-xl hover:bg-green-600 active:scale-95 transition-all disabled:opacity-50"
            >
              Absenden & Zum Podium
            </button>
          </div>
        </div>
      );
    };

    const PodiumScreen = ({ leaderboard, score, name, user, onAdminReset }) => {
      const top3 = leaderboard.slice(0, 3);
      const others = leaderboard.slice(3);

      // Spezielles Layout für den Admin: Podium rechts, restliche Platzierungen links!
      if (user?.isAdmin) {
         return (
            <div className="flex-1 flex flex-col md:flex-row w-full max-w-6xl mx-auto p-4 md:p-8 gap-8 animate-in">
               {/* Linke Seite: Weitere Platzierungen */}
               <div className="w-full md:w-1/3 bg-white/60 backdrop-blur-md rounded-3xl p-6 shadow-xl border border-white/60 flex flex-col h-[75vh]">
                  <h3 className="text-xl font-bold text-gray-800 mb-4 drop-shadow-sm border-b border-gray-300/50 pb-3">Weitere Platzierungen</h3>
                  <div className="overflow-y-auto flex-1 space-y-3 pr-2">
                     {others.map((u, idx) => (
                        <div key={u.id} className="flex justify-between items-center p-3 bg-white/80 rounded-xl shadow-sm hover:bg-white transition-colors">
                           <div className="flex items-center gap-3">
                              <span className="font-bold text-gray-500 w-6 text-right">{idx + 4}.</span>
                              <span className="font-bold text-gray-800 truncate">{u.name}</span>
                           </div>
                           <span className="font-bold text-blue-600 whitespace-nowrap">{u.score} Pkt</span>
                        </div>
                     ))}
                     {others.length === 0 && <p className="text-gray-500 text-sm text-center mt-10">Keine weiteren Teilnehmer.</p>}
                  </div>
                  <div className="mt-6 pt-4 border-t border-gray-300/50 text-center">
                     <button onClick={onAdminReset} className="w-full py-4 bg-gray-800/90 backdrop-blur-md text-white rounded-2xl font-bold hover:bg-gray-900 active:scale-95 transition-all shadow-xl flex items-center justify-center gap-2">
                       <RefreshCcw size={18} /> Neues Training starten
                     </button>
                  </div>
               </div>

               {/* Rechte Seite: Das Siegerpodest (Top 3) */}
               <div className="w-full md:w-2/3 flex flex-col items-center justify-center p-4">
                  <h1 className="text-4xl md:text-6xl font-bold text-gray-900 mb-16 text-center drop-shadow-sm">Siegerpodest</h1>
                  <div className="flex items-end justify-center gap-3 md:gap-6 w-full px-2 h-72 max-w-2xl mx-auto">
                    <div className="flex flex-col items-center flex-1">
                      <div className="glass-panel px-3 py-1 mb-2 text-center w-full">
                         <p className="text-xs md:text-sm font-bold text-gray-800 truncate w-full">{top3[1]?.name || '-'}</p>
                      </div>
                      <div className="podium-2 w-full flex items-center justify-center shadow-2xl border border-white/30"><span className="text-3xl font-bold text-white drop-shadow-md">2</span></div>
                    </div>
                    <div className="flex flex-col items-center flex-1">
                      <span className="text-yellow-500 mb-4 animate-bounce drop-shadow-lg"><Trophy size={64} /></span>
                      <div className="glass-panel px-4 py-1.5 mb-2 text-center border-yellow-400/50 w-full">
                         <p className="text-sm md:text-base font-bold text-gray-900 truncate w-full">{top3[0]?.name || '-'}</p>
                      </div>
                      <div className="podium-1 w-full flex items-center justify-center shadow-2xl border border-white/30"><span className="text-5xl font-bold text-white drop-shadow-md">1</span></div>
                    </div>
                    <div className="flex flex-col items-center flex-1">
                      <div className="glass-panel px-3 py-1 mb-2 text-center w-full">
                         <p className="text-xs md:text-sm font-bold text-gray-800 truncate w-full">{top3[2]?.name || '-'}</p>
                      </div>
                      <div className="podium-3 w-full flex items-center justify-center shadow-2xl border border-white/30"><span className="text-2xl font-bold text-white drop-shadow-md">3</span></div>
                    </div>
                  </div>
               </div>
            </div>
         );
      }

      // Normales Layout für die Teilnehmer
      return (
        <div className="flex-1 flex flex-col items-center justify-center p-4 animate-in w-full max-w-xl mx-auto pb-10">

          <div className="flex items-end justify-center gap-3 md:gap-6 mb-12 w-full px-4 h-64">
            <div className="flex flex-col items-center flex-1">
              <div className="glass-panel px-3 py-1 mb-2 text-center w-full">
                 <p className="text-xs font-bold text-gray-800 truncate w-full">{top3[1]?.name || '-'}</p>
              </div>
              <div className="podium-2 w-full flex items-center justify-center shadow-2xl border border-white/30"><span className="text-3xl font-bold text-white drop-shadow-md">2</span></div>
            </div>
            <div className="flex flex-col items-center flex-1">
              <span className="text-yellow-500 mb-4 animate-bounce drop-shadow-lg"><Trophy size={64} /></span>
              <div className="glass-panel px-4 py-1.5 mb-2 text-center border-yellow-400/50 w-full">
                 <p className="text-sm font-bold text-gray-900 truncate w-full">{top3[0]?.name || '-'}</p>
              </div>
              <div className="podium-1 w-full flex items-center justify-center shadow-2xl border border-white/30"><span className="text-5xl font-bold text-white drop-shadow-md">1</span></div>
            </div>
            <div className="flex flex-col items-center flex-1">
              <div className="glass-panel px-3 py-1 mb-2 text-center w-full">
                 <p className="text-xs font-bold text-gray-800 truncate w-full">{top3[2]?.name || '-'}</p>
              </div>
              <div className="podium-3 w-full flex items-center justify-center shadow-2xl border border-white/30"><span className="text-2xl font-bold text-white drop-shadow-md">3</span></div>

          <div className="glass-panel w-full p-8 text-center shadow-xl">
            <p className="text-gray-500 font-bold uppercase text-[10px] mb-2 tracking-widest">Deine Leistung</p>
            <p className="text-5xl font-bold text-blue-600 mb-2 drop-shadow-sm">{score} <span className="text-sm text-gray-400">Pkt</span></p>

          </div>

      );
    };

    const AdminDashboard = ({ gameState, users, onNextQuestion, onReveal, onStart, onReset, timeLeft, roomCode }) => {
      const [tType, setTType] = useState('Vor Ort');
      const [qCount, setQCount] = useState(10);
      const [partner, setPartner] = useState('Vodafone');

      const activeQuestions = gameState.activeQuestions || [];
      const currentQ = activeQuestions[gameState.currentQuestionIndex || 0];
      const sortedUsers = users; 
      const answersCount = users.filter(u => u.lastAnswerIndex !== undefined && u.lastAnswerIndex !== null).length;
      
      const isDoublePoints = gameState.doublePoints?.[gameState.currentQuestionIndex];
      const reveal = gameState.showResults;

      return (
        <div className="flex-1 p-4 md:p-12 max-w-6xl mx-auto w-full overflow-y-auto">
          <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div>
              <h1 className="text-4xl font-bold text-gray-900 mb-2 drop-shadow-sm">Live Session Control</h1>
              <p className="text-gray-600 mt-2 flex flex-wrap items-center gap-3">
                Google Pixel 10a Live Session 
                <span className="glass-panel border-blue-200 px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1 text-blue-800"><KeyRound size={12}/> RAUM: {roomCode}</span>
                {gameState.status === 'running' && (
                  <>
                    <span className="glass-panel border-purple-200 px-3 py-1 rounded-lg text-xs font-bold text-purple-800">{gameState.trainingType}</span>
                    <span className="glass-panel border-orange-200 px-3 py-1 rounded-lg text-xs font-bold text-orange-800">{gameState.partner}</span>
                  </>
                )}
              </p>
            </div>
            <div className="flex gap-4">
              {gameState.status !== 'waiting' && (
                <button onClick={onReset} className="p-4 glass-panel text-gray-600 hover:bg-white/80 transition-all shadow-md" title="Reset Session"><RefreshCcw size={20}/></button>
              )}
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-8 mb-10">
            <div className="xl:col-span-2">
              {gameState.status === 'running' && currentQ ? (
                <div className={`glass-panel p-8 md:p-12 border-l-[12px] ${isDoublePoints ? 'border-l-yellow-400' : 'border-l-blue-500'} animate-in relative`}>
                  {isDoublePoints && (
                    <div className="absolute -top-4 -right-4 bg-yellow-400 text-yellow-900 text-sm font-bold px-4 py-2 rounded-full shadow-md flex items-center gap-2 animate-bounce">
                      <Star size={16} fill="currentColor" />
                      DOPPELTE PUNKTE RUNDE
                    </div>
                  )}

                  <div className="flex flex-wrap justify-between items-center mb-8 gap-4">
                    <div className="flex items-center gap-3">
                      <span className="glass-panel border-blue-200 text-blue-800 px-5 py-2 rounded-full text-xs font-bold uppercase tracking-wider">Frage {gameState.currentQuestionIndex + 1} / {activeQuestions.length}</span>
                      <span className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider flex items-center gap-2 ${timeLeft === 0 ? 'bg-red-100/90 text-red-700 animate-pulse' : 'glass-panel text-gray-700'}`}>
                        <Clock size={14} /> {timeLeft} Sek
                      </span>
                    </div>
                    <div className="flex items-center gap-2 text-gray-700 font-bold glass-panel px-4 py-2 rounded-full">
                      <User size={18} /> 
                      <span>{answersCount} / {users.length} Antworten</span>
                    </div>
                  </div>
                  
                  <h2 className="text-2xl md:text-4xl font-bold mb-10 text-gray-900 leading-tight drop-shadow-sm">{currentQ.q}</h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
                    {currentQ.options.map((opt, i) => {
                      const isCorrect = i === currentQ.correct;
                      const colors = GOOGLE_COLORS[i % 4];
                      let styleClass = `${colors.bg} ${colors.text}`;

                      if (reveal) {
                         if (isCorrect) styleClass += " scale-105 shadow-xl ring-4 ring-offset-2 ring-green-400";
                         else styleClass += " opacity-40 grayscale";
                      }

                      return (
                        <div key={i} className={`p-6 rounded-2xl shadow-md transition-all duration-300 flex justify-between items-center text-lg font-bold ${styleClass}`}>
                          <span className="drop-shadow-sm">{opt}</span>
                          {reveal && isCorrect && <CheckCircle2 size={28} />}
                        </div>
                      );
                    })}
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4">
                    {!reveal ? (
                      <button onClick={onReveal} className="flex-1 py-5 bg-blue-600/90 backdrop-blur-md text-white rounded-2xl font-bold text-xl flex items-center justify-center gap-3 shadow-xl hover:bg-blue-700 transition-all"><Eye size={24}/> Antwort auflösen</button>
                    ) : (
                      <button onClick={onNextQuestion} className="flex-1 py-5 bg-indigo-600/90 backdrop-blur-md text-white rounded-2xl font-bold text-xl flex items-center justify-center gap-3 shadow-xl hover:bg-indigo-700 transition-all">
                        {gameState.currentQuestionIndex < activeQuestions.length - 1 ? 'Nächste Frage' : 'Feedback einholen'} <ChevronRight size={24}/>
                      </button>
                    )}
                  </div>
                </div>
              ) : (
                <div className="glass-panel p-10 animate-in shadow-xl">
                   <div className="w-20 h-20 bg-blue-100/80 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                      <Users size={40} />
                   </div>
                   <h2 className="text-2xl font-bold text-gray-900 mb-2 text-center drop-shadow-sm">Bereit für den Start?</h2>
                   <p className="text-gray-600 text-center mb-8">Sag den Teilnehmern, sie sollen den Raum-Code <strong className="text-blue-700">{roomCode}</strong> eingeben.</p>
                   
                   {/* DIESER BEREICH WIRD NUR VOM ADMIN GESEHEN */}
                   <div className="bg-white/40 backdrop-blur-sm p-6 rounded-2xl border border-white/60 shadow-sm">
                      <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><Shuffle size={18}/> Trainings-Einstellungen</h3>
                      
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div>
                           <label className="block text-xs font-bold text-gray-600 uppercase mb-2 drop-shadow-sm">Partner</label>
                           <select value={partner} onChange={e => setPartner(e.target.value)} className="w-full p-4 rounded-xl border border-white/80 bg-white/60 backdrop-blur-md font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                              <option value="Vodafone">Vodafone</option>
                              <option value="Telefonica">Telefonica</option>
                              <option value="Telekom">Telekom</option>
                              <option value="freenet">freenet</option>
                              <option value="other">other</option>
                           </select>
                        </div>
                        <div>
                           <label className="block text-xs font-bold text-gray-600 uppercase mb-2 drop-shadow-sm">Trainingsart</label>
                           <select value={tType} onChange={e => setTType(e.target.value)} className="w-full p-4 rounded-xl border border-white/80 bg-white/60 backdrop-blur-md font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                              <option value="Vor Ort">Vor Ort</option>
                              <option value="Digital">Digital</option>
                           </select>
                        </div>
                        <div>
                           <label className="block text-xs font-bold text-gray-600 uppercase mb-2 drop-shadow-sm">Fragen</label>
                           <select value={qCount} onChange={e => setQCount(Number(e.target.value))} className="w-full p-4 rounded-xl border border-white/80 bg-white/60 backdrop-blur-md font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                              <option value={5}>5 Fragen</option>
                              <option value={10}>10 Fragen</option>
                              <option value={15}>15 Fragen</option>
                              <option value={20}>20 Fragen</option>
                              <option value={25}>25 Fragen</option>
                              <option value={30}>30 Fragen</option>
                              <option value={40}>40 Fragen</option>
                           </select>
                        </div>
                      </div>
                      
                      <button onClick={() => onStart(tType, qCount, partner)} className="w-full py-5 bg-green-500/90 backdrop-blur-md text-white rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl hover:bg-green-600 active:scale-95 transition-all text-lg">
                        <Shuffle size={24}/> Fragen mischen & Quiz starten
                      </button>
                   </div>
                </div>
              )}
            </div>

            <div className="glass-panel p-8 h-fit">
              <h3 className="font-bold text-gray-500 uppercase text-xs mb-6 tracking-widest border-b border-gray-200/50 pb-4 drop-shadow-sm">
                {gameState.status === 'running' ? 'Live Rangliste' : 'Lobby - Teilnehmer'}
              </h3>
              <div className="space-y-3">
                {sortedUsers.map((u, i) => (
                  <div key={u.id} className="flex justify-between items-center p-4 bg-white/40 hover:bg-white/60 rounded-2xl transition-all border border-white/50 shadow-sm">
                    <div className="flex items-center gap-4">
                      <span className={`font-bold w-7 h-7 flex items-center justify-center rounded-full text-xs shadow-sm ${i === 0 ? 'bg-yellow-200 text-yellow-800' : 'bg-white/80 text-gray-600'}`}>
                        {i+1}
                      </span>
                      <span className="font-bold text-gray-800 drop-shadow-sm">{u.name}</span>
                    </div>
                    <span className="font-bold text-blue-700 drop-shadow-sm">{u.score} <span className="text-[10px] text-gray-500">Pkt</span></span>
                  </div>
                ))}
                {sortedUsers.length === 0 && (
                  <div className="text-center py-8">
                     <p className="text-gray-500 text-sm font-medium">Warte auf Teilnehmer...</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [userId, setUserId] = useState(null);
      const [gameState, setGameState] = useState({ status: 'loading' });
      const [allUsers, setAllUsers] = useState([]);
      const [userAnswer, setUserAnswer] = useState(null);
      const [timeLeft, setTimeLeft] = useState(0);
      const [step, setStep] = useState('login'); 
      const [activeRoom, setActiveRoom] = useState(null);
      const [roomCodeUI, setRoomCodeUI] = useState('');

      const userRef = useRef(null);
      const userAnswerRef = useRef(null);

      useEffect(() => { userRef.current = user; }, [user]);
      useEffect(() => { userAnswerRef.current = userAnswer; }, [userAnswer]);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth Error", e);
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, u => { 
          if(u) setUserId(u.uid); 
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!userId || !activeRoom) return;
        const gameRef = doc(db, 'artifacts', activeRoom, 'public', 'gameState');
        
        const unsub = onSnapshot(gameRef, snap => {
          if (snap.exists()) {
            const data = snap.data();
            setGameState(data);
            
            if (user) {
              if (!user.isAdmin && data.sessionId && user.sessionId && data.sessionId !== user.sessionId) {
                  setUser(null);
                  setActiveRoom(null);
                  setStep('login');
                  return;
              }

              if (data.status === 'podium') setStep('podium');
              else if (user.isAdmin) setStep('admin');
              else if (data.status === 'running') setStep('quiz');
              else if (data.status === 'feedback') setStep('feedback');
              else if (data.status === 'waiting') setStep('waiting');
            }
          }
        }, (error) => console.error("Snapshot error", error));
        
        return () => unsub();
      }, [userId, user, activeRoom]);

      useEffect(() => {
        setUserAnswer(null);
      }, [gameState.currentQuestionIndex]);

      useEffect(() => {
        if (gameState.status === 'running' && !gameState.showResults) {
          setTimeLeft(30);
          
          const timeoutId = setTimeout(() => {
             if (userRef.current && !userRef.current.isAdmin && userAnswerRef.current === null) {
                handleAnswer(-1);
             }
          }, 30000);

          const intervalId = setInterval(() => {
            setTimeLeft(prev => Math.max(0, prev - 1));
          }, 1000);

          return () => {
             clearTimeout(timeoutId);
             clearInterval(intervalId);
          };
        }
      }, [gameState.status, gameState.currentQuestionIndex, gameState.showResults]);

      useEffect(() => {
        if (!userId || !activeRoom) return;
        
        const q = query(collection(db, 'artifacts', activeRoom, 'users'));
        const unsub = onSnapshot(q, snap => {
          const list = [];
          const currentSessionId = gameState.sessionId || 'default';
          snap.forEach(d => {
            const data = d.data();
            if (data.sessionId === currentSessionId) {
              list.push({ id: d.id, ...data });
            }
          });
          setAllUsers(list);
        }, (error) => console.error(error));
        return () => unsub();
      }, [userId, activeRoom, gameState.sessionId]);

      const handleJoin = async (name, enteredRoomCode) => {
        if (!userId) return;
        
        const safeRoomCode = enteredRoomCode.toUpperCase();
        const newRoom = `${BASE_APP_ID}-${safeRoomCode}`;
        const isAdmin = name.toLowerCase() === 'admin';
        
        setRoomCodeUI(safeRoomCode);
        setActiveRoom(newRoom);

        const gameRef = doc(db, 'artifacts', newRoom, 'public', 'gameState');
        const gameSnap = await getDoc(gameRef);
        
        let currentStatus = 'waiting';
        let currentSessionId = 'default';

        if (gameSnap.exists()) {
            currentStatus = gameSnap.data().status || 'waiting';
            currentSessionId = gameSnap.data().sessionId || 'default';
        } else if (isAdmin) {
            await setDoc(gameRef, { status: 'waiting', currentQuestionIndex: 0, sessionId: 'default' });
        }

        const uData = { name, isAdmin, score: 0, finished: false, sessionId: currentSessionId, answers: {} };
        setUser(uData);
        
        if (!isAdmin) {
          await setDoc(doc(db, 'artifacts', newRoom, 'users', userId), uData);
          if (currentStatus === 'running') setStep('quiz');
          else if (currentStatus === 'feedback') setStep('feedback');
          else if (currentStatus === 'podium') setStep('podium');
          else setStep('waiting');
        } else {
          setStep('admin');
        }
      };

      const handleAnswer = async (idx) => {
        if (userAnswerRef.current !== null || !userId || !activeRoom) return;
        
        setUserAnswer(idx); 
        
        // PUNKTE WERDEN HIER NOCH NICHT VERGEBEN! (Nur die Antwort und Zeit gespeichert, um Spannung aufzubauen)
        await updateDoc(doc(db, 'artifacts', activeRoom, 'users', userId), { 
          lastAnswerIndex: idx,
          lastAnswerTime: Date.now(),
          [`answers.${gameState.currentQuestionIndex}`]: idx
        });
      };

      const handleFinishFeedback = async (f1, f2) => {
        if(!userId || !activeRoom) return;
        await updateDoc(doc(db, 'artifacts', activeRoom, 'users', userId), { 
          finished: true, 
          feedback: { r1: f1, r2: f2 } 
        });
        setStep('waiting'); 
      };

      const adminStart = async (trainingType, count, partner) => {
        if (!activeRoom) return;
        
        let shuffled = [...ALL_QUESTIONS].sort(() => 0.5 - Math.random());
        shuffled = shuffled.slice(0, Math.min(count, ALL_QUESTIONS.length));
        
        const randomDoublePoints = Array.from({length: shuffled.length}, () => Math.random() < 0.3);
        const currentDate = new Date().toLocaleDateString('de-DE');
        
        await setDoc(doc(db, 'artifacts', activeRoom, 'public', 'gameState'), { 
          status: 'running', 
          currentQuestionIndex: 0, 
          showResults: false,
          doublePoints: randomDoublePoints,
          activeQuestions: shuffled,
          trainingType: trainingType,
          partner: partner,
          date: currentDate
        }, { merge: true });
      };

      const adminReveal = async () => {
        if (!activeRoom) return;

        const activeQuestions = gameState.activeQuestions || [];
        const currentQIndex = gameState.currentQuestionIndex || 0;
        const currentQ = activeQuestions[currentQIndex];
        const isDouble = gameState.doublePoints?.[currentQIndex];
        const multiplier = isDouble ? 2 : 1;

        // PUNKTE-BERECHNUNG NACH SCHNELLIGKEIT:
        // Alle richtigen Antworten filtern und nach Zeit sortieren
        const correctUsers = allUsers.filter(u => !u.isAdmin && u.lastAnswerIndex === currentQ.correct);
        correctUsers.sort((a, b) => (a.lastAnswerTime || 0) - (b.lastAnswerTime || 0));

        const updatePromises = [];

        // Die Schnellen bekommen am meisten Punkte (100, 95, 90 ... mind. 5 Punkte)
        correctUsers.forEach((u, i) => {
          let pointsToAdd = Math.max(5, 100 - (i * 5)) * multiplier;
          updatePromises.push(updateDoc(doc(db, 'artifacts', activeRoom, 'users', u.id), {
             score: increment(pointsToAdd),
             lastPointsEarned: pointsToAdd // Um den Teilnehmern zu zeigen, wie viel sie bekommen haben
          }));
        });

        // Alle, die falsch oder gar nicht geantwortet haben, bekommen 0 Punkte auf dem Bildschirm angezeigt
        const wrongUsers = allUsers.filter(u => !u.isAdmin && u.lastAnswerIndex !== currentQ.correct && u.lastAnswerIndex !== undefined && u.lastAnswerIndex !== null);
        wrongUsers.forEach(u => {
            updatePromises.push(updateDoc(doc(db, 'artifacts', activeRoom, 'users', u.id), {
                lastPointsEarned: 0
            }));
        });

        await Promise.all(updatePromises);
        await setDoc(doc(db, 'artifacts', activeRoom, 'public', 'gameState'), { showResults: true }, { merge: true });
      };

      const adminNext = async () => {
        if (!activeRoom) return;
        const activeQuestions = gameState.activeQuestions || [];
        const nextIndex = (gameState.currentQuestionIndex || 0) + 1;
        
        if (nextIndex < activeQuestions.length) {
          const updatePromises = allUsers.map(u => updateDoc(doc(db, 'artifacts', activeRoom, 'users', u.id), { lastAnswerIndex: null }));
          await Promise.all(updatePromises);
          
          await setDoc(doc(db, 'artifacts', activeRoom, 'public', 'gameState'), { 
            currentQuestionIndex: nextIndex, 
            showResults: false 
          }, { merge: true });
        } else {
          await setDoc(doc(db, 'artifacts', activeRoom, 'public', 'gameState'), { status: 'feedback' }, { merge: true });
        }
      };

      const adminReset = async () => {
        if (!activeRoom) return;
        const newSessionId = Date.now().toString();
        await setDoc(doc(db, 'artifacts', activeRoom, 'public', 'gameState'), { 
          status: 'waiting', 
          currentQuestionIndex: 0,
          sessionId: newSessionId
        });
      };

      const adminToPodium = async () => {
        if (!activeRoom) return;
        await setDoc(doc(db, 'artifacts', activeRoom, 'public', 'gameState'), { status: 'podium' }, { merge: true });
      };

      // Rangliste für die Anzeige
      const displayUsers = [...allUsers].sort((a, b) => (b.score || 0) - (a.score || 0));
      const myIndex = displayUsers.findIndex(u => u.id === userId);
      const myRank = myIndex >= 0 ? myIndex + 1 : '-';
      const myScore = myIndex >= 0 ? displayUsers[myIndex].score : 0;

      let content = null;

      if (!user) {
        content = <LoginScreen onJoin={handleJoin} />;
      }
      else if (step === 'podium') {
        content = <PodiumScreen 
            leaderboard={displayUsers} 
            score={allUsers.find(u => u.id === userId)?.score || 0} 
            name={user.name} 
            user={user} 
            onAdminReset={adminReset} 
          />;
      }
      else if (step === 'admin' || user.isAdmin) {
        content = (
          <div className="flex-1 flex flex-col relative">
            <AdminDashboard gameState={gameState} users={displayUsers} onStart={adminStart} onReveal={adminReveal} onNextQuestion={adminNext} onReset={adminReset} timeLeft={timeLeft} roomCode={roomCodeUI} />
            {gameState.status === 'feedback' && (
               <div className="fixed bottom-8 left-1/2 -translate-x-1/2">
                  <button onClick={adminToPodium} className="px-12 py-5 bg-yellow-500/90 backdrop-blur-md text-white rounded-2xl font-bold shadow-2xl hover:bg-yellow-600 active:scale-95 transition-all text-xl whitespace-nowrap border border-yellow-300">Siegerpodest anzeigen</button>
               </div>
            )}
          </div>
        );
      }
      else if (step === 'waiting') {
        content = (
          <div className="flex-1 flex flex-col items-center justify-center p-6 text-center animate-in">
            <div className="glass-panel p-12 max-w-sm w-full shadow-2xl">
              <div className="w-24 h-24 bg-blue-100/80 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                <User size={48} />
              </div>
              <h2 className="text-3xl font-bold mb-3 text-gray-900 drop-shadow-sm">Moin {user.name.split(' ')[0]}!</h2>
              <p className="text-gray-600 leading-relaxed font-medium">Bitte hab einen Moment Geduld. Der Trainer startet die Session gleich im Raum <strong className="text-blue-700">{roomCodeUI}</strong>.</p>
            </div>
          </div>
        );
      } else if (step === 'quiz') {
        content = <QuizScreen 
            question={gameState.activeQuestions[gameState.currentQuestionIndex]} 
            index={gameState.currentQuestionIndex} 
            totalQuestions={gameState.activeQuestions.length}
            onAnswer={handleAnswer} 
            timeLeft={timeLeft} 
            showResults={gameState.showResults} 
            userAnswer={userAnswer}
            isDoublePoints={gameState.doublePoints?.[gameState.currentQuestionIndex]} 
            myRank={myRank}
            myScore={myScore}
            lastPointsEarned={allUsers.find(u => u.id === userId)?.lastPointsEarned || 0}
          />;
      } else if (step === 'feedback') {
        content = <FeedbackScreen onFinish={handleFinishFeedback} />;
      } else {
        content = <div className="flex-1 flex items-center justify-center"><div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;
      }

      return (
        <div className="flex-1 flex flex-col w-full h-full relative">
          <div className="w-full flex justify-center items-center px-6 md:px-10 pt-8 pb-4 shrink-0 z-50">
            <img src="https://i.postimg.cc/3RYySfcs/google-icon-logo-new-old.png" alt="Google Logo" className="h-16 md:h-24 lg:h-28 object-contain drop-shadow-sm opacity-90" />
          </div>
          {content}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
